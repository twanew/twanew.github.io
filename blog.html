        const filterBar = document.getElementById('filterBar');

        // GitHub SVG 图标内联字符串
        const GITHUB_SVG = `
            <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
        `;

        /**
         * 渲染分类按钮
         */
        function renderFilters() {
            CATEGORIES.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${index === 0 ? 'active' : ''}`;
                btn.textContent = cat.label;
                btn.dataset.category = cat.value;
                btn.addEventListener('click', () => handleFilter(cat.value));
                filterBar.appendChild(btn);
            });
        }

        /**
         * 渲染所有项目卡片
         */
        function renderCards() {
            PROJECTS.forEach((project, index) => {
                const card = document.createElement('a');
                card.className = 'project-card';
                card.href = project.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.dataset.category = project.category;
                // 错落入场延迟（仅首次加载）
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title-wrap">
                            <span class="card-icon">${project.icon}</span>
                            <h3 class="card-title">${project.title}</h3>
                        </div>
                        ${GITHUB_SVG}
                    </div>
                    <p class="card-description">${project.description}</p>
                    <div class="card-tags">
                        ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                `;

                cardsGrid.appendChild(card);
            });
        }

        /**
         * 处理分类筛选（无动画版本）
         */
        function handleFilter(category) {
            // 更新按钮选中状态
            const buttons = filterBar.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            // 直接切换卡片显示隐藏，无过渡动画
            const cards = cardsGrid.querySelectorAll('.project-card');
            cards.forEach(card => {
                const cardCategory = card.dataset.category;
                const shouldShow = category === 'all' || cardCategory === category;
                card.classList.toggle('hide', !shouldShow);
            });
        }

        /**
         * 初始化
         */
        function init() {
            renderFilters();
            renderCards();
        }

        // 启动
        document.addEventListener('DOMContentLoaded', init);
  </script>
