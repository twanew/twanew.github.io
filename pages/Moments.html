    <style>
        :root {
            /* ========== 核心配色 ========== */
            --color-bg-deep: #0a0612;
            --color-bg-card: rgba(18, 14, 30, 0.55);
            --color-bg-card-hover: rgba(22, 16, 36, 0.65);
            --color-bg-glass: rgba(16, 12, 28, 0.5);
            --color-bg-search: rgba(20, 15, 35, 0.55);
            --color-bg-code: rgba(8, 6, 18, 0.85);
            --color-bg-table-header: rgba(90, 50, 180, 0.35);
            --color-bg-overlay: rgba(4, 2, 12, 0.82);

            /* ========== 霓虹荧光色系 ========== */
            --neon-purple: #b388f5;
            --neon-purple-bright: #c9a0ff;
            --neon-purple-soft: #9b6fe8;
            --neon-cyan: #5ce0d4;
            --neon-cyan-soft: #7ee8df;
            --neon-blue: #6db3f2;
            --neon-pink: #e890b8;
            --neon-green: #8ce89a;
            --neon-yellow: #e8d88c;
            --neon-orange: #e8b878;

            /* ========== 发光参数 ========== */
            --glow-soft-purple: 0 0 18px rgba(160, 110, 235, 0.45), 0 0 40px rgba(140, 90, 220, 0.2);
            --glow-medium-purple: 0 0 24px rgba(170, 120, 240, 0.55), 0 0 55px rgba(150, 100, 230, 0.28);
            --glow-strong-purple: 0 0 32px rgba(180, 130, 245, 0.65), 0 0 70px rgba(160, 110, 235, 0.35);
            --glow-cyan: 0 0 14px rgba(90, 220, 210, 0.5), 0 0 32px rgba(70, 200, 190, 0.22);
            --glow-text-title: 0 0 22px rgba(170, 140, 230, 0.55), 0 0 50px rgba(140, 110, 210, 0.25);
            --glow-tag: 0 0 12px rgba(150, 90, 230, 0.5), 0 0 28px rgba(130, 70, 210, 0.25);
            --glow-card-border: 0 0 8px rgba(140, 100, 220, 0.35), 0 0 20px rgba(120, 80, 200, 0.15);
            --glow-card-border-hover: 0 0 16px rgba(160, 120, 235, 0.55), 0 0 36px rgba(140, 100, 220, 0.28);
            --glow-btn-selected: 0 0 16px rgba(150, 110, 235, 0.5), 0 0 38px rgba(130, 90, 215, 0.25);

            /* ========== 圆角 ========== */
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-capsule: 999px;

            /* ========== 布局 ========== */
            --content-width: 70%;
            --content-side: 15%;
            --card-gap-h: 22px;
            --card-gap-v: 22px;
            --column-count: 2;
            --section-padding: 32px;

            /* ========== 过渡 ========== */
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-card-hover: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-lightbox: 0.38s cubic-bezier(0.4, 0, 0.2, 1);

            /* ========== 字体 ========== */
            --font-title: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Consolas', 'Monaco', monospace;
        }

        /* ========== 移动端变量覆盖 ========== */
        @media (max-width: 767px) {
            :root {
                --content-width: 92%;
                --content-side: 4%;
                --column-count: 1;
                --card-gap-h: 14px;
                --card-gap-v: 16px;
                --section-padding: 18px;
                --radius-lg: 18px;
                --radius-xl: 22px;
            }
        }

        @media (min-width: 768px) and (max-width: 1199px) {
            :root {
                --content-width: 82%;
                --content-side: 9%;
                --column-count: 2;
                --card-gap-h: 18px;
                --card-gap-v: 20px;
                --section-padding: 26px;
            }
        }

        /* ========== 全局重置 ========== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg-deep);
            color: #e0dce8;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
            /* 背景：二次元插画 + 深紫渐变蒙版 */
            background-image:
                linear-gradient(180deg,
                    rgba(22, 8, 40, 0.78) 0%,
                    rgba(14, 4, 28, 0.72) 25%,
                    rgba(10, 2, 22, 0.76) 50%,
                    rgba(16, 6, 32, 0.74) 75%,
                    rgba(20, 8, 36, 0.78) 100%),
                url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?w=1920&q=80');
            background-size: cover, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            background-attachment: fixed, fixed;
        }

        /* 背景图加载失败时的fallback */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(120, 40, 200, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 60%, rgba(30, 180, 180, 0.14) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(80, 30, 160, 0.16) 0%, transparent 50%),
                linear-gradient(180deg, #0d0518 0%, #100820 40%, #0a0416 70%, #0e061c 100%);
            pointer-events: none;
        }

        /* ========== Canvas 粒子层 ========== */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.85;
        }

        /* ========== 主内容容器 ========== */
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: var(--content-width);
            margin: 0 auto;
            padding: 130px 0 60px;
        }

        /* ========== 顶部标题功能区 ========== */
        .header-section {
            text-align: center;
            margin-bottom: 38px;
            padding: var(--section-padding) 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: clamp(2.2rem, 4.5vw, 3.4rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.06em;
            text-shadow: var(--glow-text-title);
            margin-bottom: 8px;
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%,
            100% {
                text-shadow: 0 0 22px rgba(170, 140, 230, 0.55), 0 0 50px rgba(140, 110, 210, 0.25);
            }
            50% {
                text-shadow: 0 0 30px rgba(185, 155, 240, 0.7), 0 0 65px rgba(155, 125, 225, 0.35), 0 0 90px rgba(140, 110, 210, 0.18);
            }
        }

        .subtitle-slogan {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: rgba(210, 200, 230, 0.7);
            font-weight: 400;
            letter-spacing: 0.04em;
            margin-bottom: 22px;
        }

        .slogan-icon {
            display: inline-block;
            font-size: 1rem;
            animation: iconFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(180, 150, 230, 0.5));
        }

        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        .slogan-icon:nth-child(1) {
            animation-delay: 0s;
        }
        .slogan-icon:nth-child(3) {
            animation-delay: 1.5s;
        }

        /* ========== 搜索框 ========== */
        .search-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .search-input {
            width: 100%;
            padding: 13px 18px 13px 46px;
            border-radius: var(--radius-capsule);
            border: 1.5px solid rgba(140, 110, 200, 0.3);
            background: var(--color-bg-search);
            /* 毛玻璃 */
            backdrop-filter: blur(18px) saturate(130%);
            -webkit-backdrop-filter: blur(18px) saturate(130%);
            color: #e8e0f4;
            font-size: 0.95rem;
            font-family: var(--font-body);
            letter-spacing: 0.03em;
            outline: none;
            transition: border-color var(--transition-smooth), box-shadow var(--transition-smooth), background var(--transition-smooth);
            box-shadow: 0 0 0px transparent;
        }

        .search-input::placeholder {
            color: rgba(190, 175, 215, 0.5);
            font-style: italic;
            letter-spacing: 0.04em;
        }

        .search-input:focus {
            border-color: rgba(170, 130, 235, 0.7);
            box-shadow: 0 0 20px rgba(150, 110, 225, 0.4), 0 0 45px rgba(130, 90, 200, 0.18);
            background: rgba(25, 18, 42, 0.65);
        }

        .search-icon {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: rgba(180, 160, 210, 0.6);
            pointer-events: none;
            transition: color var(--transition-smooth);
        }

        .search-input:focus~.search-icon {
            color: rgba(200, 175, 235, 0.9);
            filter: drop-shadow(0 0 8px rgba(160, 120, 220, 0.6));
        }

        /* ========== 排序按钮组 ========== */
        .sort-btn-group {
            display: inline-flex;
            border-radius: var(--radius-capsule);
            overflow: hidden;
            border: 1.5px solid rgba(140, 110, 200, 0.3);
            background: rgba(18, 12, 30, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .sort-btn {
            padding: 9px 24px;
            font-size: 0.9rem;
            font-family: var(--font-body);
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            border: none;
            background: transparent;
            color: rgba(200, 185, 220, 0.7);
            transition: all var(--transition-smooth);
            white-space: nowrap;
            position: relative;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .sort-btn:first-child {
            border-radius: var(--radius-capsule) 0 0 var(--radius-capsule);
        }
        .sort-btn:last-child {
            border-radius: 0 var(--radius-capsule) var(--radius-capsule) 0;
        }

        .sort-btn:hover:not(.sort-btn--active) {
            color: rgba(220, 205, 240, 0.9);
            background: rgba(100, 60, 170, 0.2);
        }

        .sort-btn--active {
            background: linear-gradient(135deg, rgba(130, 70, 210, 0.7) 0%, rgba(100, 50, 185, 0.75) 100%);
            color: #ffffff;
            box-shadow: var(--glow-btn-selected);
            font-weight: 600;
        }

        /* ========== 瀑布流容器 ========== */
        .moments-grid {
            column-count: var(--column-count);
            column-gap: var(--card-gap-h);
            padding: 0 4px;
        }

        /* ========== 动态卡片 ========== */
        .moment-card {
            break-inside: avoid;
            margin-bottom: var(--card-gap-v);
            border-radius: var(--radius-xl);
            background: var(--color-bg-card);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(150, 115, 220, 0.28);
            box-shadow: var(--glow-card-border);
            padding: 20px 22px 18px;
            transition: transform var(--transition-card-hover), box-shadow var(--transition-card-hover), border-color var(--transition-card-hover), background var(--transition-card-hover);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .moment-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-card-hover);
            background: linear-gradient(135deg,
                    rgba(160, 120, 230, 0.06) 0%,
                    rgba(100, 180, 200, 0.04) 50%,
                    rgba(140, 100, 210, 0.05) 100%);
        }

        .moment-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--glow-card-border-hover);
            border-color: rgba(175, 140, 235, 0.5);
            background: var(--color-bg-card-hover);
        }

        .moment-card:hover::after {
            opacity: 1;
        }

        /* ========== 卡片头部 ========== */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(150, 120, 210, 0.18);
        }

        .card-moments-badge {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: rgba(185, 160, 225, 0.75);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-moments-badge::before {
            content: '◆';
            font-size: 0.5rem;
            color: var(--neon-purple-soft);
            filter: drop-shadow(0 0 5px rgba(155, 110, 230, 0.6));
        }

        .card-date {
            font-size: 0.78rem;
            color: rgba(180, 165, 200, 0.55);
            letter-spacing: 0.03em;
            font-weight: 400;
        }

        /* ========== 内容模块通用间距 ========== */
        .card-body>*+* {
            margin-top: 16px;
        }

        /* ========== 文本段落模块 ========== */
        .content-text {
            color: #e8e0f6;
            font-size: 0.93rem;
            line-height: 1.85;
            letter-spacing: 0.025em;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* ========== 图片展示组模块 ========== */
        .content-images {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .content-images--single .content-image-thumb {
            width: 100%;
            max-height: 340px;
            object-fit: cover;
        }

        .content-images--multi {
            flex-direction: row;
        }
        .content-images--multi .content-image-thumb {
            width: calc(50% - 5px);
            aspect-ratio: 4 / 3;
            object-fit: cover;
            flex-shrink: 0;
        }

        .content-image-thumb {
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth), filter var(--transition-smooth);
            display: block;
            border: 1.5px solid rgba(150, 115, 215, 0.25);
            filter: brightness(0.92);
            box-shadow: 0 0 8px rgba(130, 90, 200, 0.2);
        }

        .content-image-thumb:hover {
            transform: scale(1.03);
            filter: brightness(1.05);
            box-shadow: 0 0 18px rgba(160, 120, 230, 0.4), 0 0 35px rgba(130, 90, 200, 0.18);
            border-color: rgba(175, 140, 235, 0.55);
        }

        /* ========== 代码块模块 ========== */
        .content-code-wrapper {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(130, 100, 200, 0.3);
            background: var(--color-bg-code);
            box-shadow: inset 0 0 30px rgba(20, 10, 50, 0.5), 0 0 12px rgba(100, 60, 180, 0.2);
        }

        .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: rgba(40, 20, 70, 0.5);
            border-bottom: 1px solid rgba(140, 100, 210, 0.25);
            font-size: 0.72rem;
            color: rgba(190, 170, 215, 0.7);
            letter-spacing: 0.05em;
            font-family: var(--font-mono);
        }

        .code-lang-tag {
            color: var(--neon-cyan-soft);
            font-weight: 600;
            text-shadow: 0 0 8px rgba(100, 220, 210, 0.5);
        }

        .code-block-content {
            display: flex;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.7;
            max-height: 380px;
            overflow-y: auto;
        }

        .code-line-numbers {
            flex-shrink: 0;
            padding: 12px 10px 12px 14px;
            text-align: right;
            color: rgba(150, 135, 185, 0.5);
            user-select: none;
            border-right: 1px solid rgba(130, 100, 190, 0.2);
            background: rgba(10, 6, 20, 0.4);
            min-width: 40px;
            font-size: 0.75rem;
            letter-spacing: 0.02em;
        }

        .code-line-numbers span {
            display: block;
            line-height: 1.7;
        }

        .code-text {
            flex: 1;
            padding: 12px 14px;
            margin: 0;
            white-space: pre;
            color: #d8d0e8;
            letter-spacing: 0.02em;
            tab-size: 4;
            -moz-tab-size: 4;
        }

        /* 语法高亮 */
        .code-kw {
            color: #c792ea;
            font-weight: 600;
            text-shadow: 0 0 6px rgba(180, 120, 230, 0.45);
        }
        .code-str {
            color: #8ce89a;
            text-shadow: 0 0 4px rgba(120, 220, 150, 0.35);
        }
        .code-cmt {
            color: #6a7a8a;
            font-style: italic;
        }
        .code-num {
            color: #e8b878;
        }
        .code-fn {
            color: #82cfff;
            text-shadow: 0 0 5px rgba(100, 190, 240, 0.35);
        }
        .code-op {
            color: #e890b8;
        }

        /* ========== 数据表格模块 ========== */
        .content-table-wrapper {
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid rgba(140, 105, 210, 0.3);
            box-shadow: 0 0 10px rgba(110, 70, 190, 0.18);
        }

        .content-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }

        .content-table thead th {
            background: var(--color-bg-table-header);
            color: #e8e0f8;
            font-weight: 600;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid rgba(160, 120, 225, 0.4);
            text-shadow: 0 0 8px rgba(170, 130, 225, 0.45);
            font-size: 0.82rem;
            letter-spacing: 0.05em;
        }

        .content-table tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid rgba(130, 100, 190, 0.18);
            color: #d5cde4;
            background: rgba(14, 8, 26, 0.35);
        }

        .content-table tbody tr:hover td {
            background: rgba(40, 20, 70, 0.4);
        }
        .content-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ========== 定位标签 ========== */
        .card-location-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 14px;
            padding: 6px 14px;
            border-radius: var(--radius-capsule);
            background: linear-gradient(135deg, rgba(140, 70, 215, 0.65) 0%, rgba(110, 50, 190, 0.7) 100%);
            color: #f0e8ff;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            box-shadow: var(--glow-tag);
            border: 1px solid rgba(180, 140, 230, 0.35);
        }

        .card-location-tag::before {
            content: '📍';
            font-size: 0.7rem;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(180, 160, 210, 0.55);
            font-size: 1rem;
            letter-spacing: 0.05em;
            column-span: all;
        }

        .empty-state-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 16px rgba(150, 110, 220, 0.4));
            animation: iconFloat 3.5s ease-in-out infinite;
        }

        /* ========== 灯箱 ========== */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--color-bg-overlay);
            backdrop-filter: blur(14px) saturate(120%);

    <script>
        (function() {
            // ==================== 粒子特效系统 ====================
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');

            let particles = [];
            const PARTICLE_COUNT = 65;
            let animationFrameId;
            let canvasWidth, canvasHeight;

            // 粒子配色池（蓝紫-青绿渐变）
            const particleColors = [
                { r: 160, g: 120, b: 230, a: 0.7 }, // 蓝紫
                { r: 130, g: 160, b: 235, a: 0.65 }, // 淡蓝紫
                { r: 90, g: 210, b: 210, a: 0.6 }, // 青绿
                { r: 110, g: 190, b: 225, a: 0.62 }, // 蓝青
                { r: 170, g: 140, b: 225, a: 0.68 }, // 浅紫
                { r: 80, g: 200, b: 195, a: 0.58 }, // 薄荷青
            ];

            class Particle {
                constructor() {
                    this.reset(true);
                }

                reset(initial = false) {
                    this.x = Math.random() * canvasWidth;
                    this.y = initial ? Math.random() * canvasHeight : canvasHeight + 30;
                    this.radius = Math.random() * 2.8 + 1.2;
                    const colorRef = particleColors[Math.floor(Math.random() * particleColors.length)];
                    this.baseR = colorRef.r;
                    this.baseG = colorRef.g;
                    this.baseB = colorRef.b;
                    this.baseAlpha = colorRef.a;
                    // 漂浮速度
                    this.vx = (Math.random() - 0.5) * 0.35;
                    this.vy = -(Math.random() * 0.45 + 0.2);
                    // 呼吸闪烁参数
                    this.phase = Math.random() * Math.PI * 2;
                    this.freq = Math.random() * 0.025 + 0.012;
                    this.amp = Math.random() * 0.45 + 0.35;
                    // 横向漂移微调
                    this.driftAmp = Math.random() * 0.18;
                    this.driftFreq = Math.random() * 0.015 + 0.006;
                    this.time = Math.random() * 1000;
                }

                update() {
                    this.time += 1;
                    this.x += this.vx + Math.sin(this.time * this.driftFreq) * this.driftAmp;
                    this.y += this.vy;
                    // 呼吸闪烁
                    const breathe = Math.sin(this.time * this.freq + this.phase) * this.amp + (1 - this.amp *
                        0.5);
                    this.currentAlpha = Math.max(0.08, Math.min(1, this.baseAlpha * breathe));
                    // 边界重置
                    if (this.y < -20 || this.x < -30 || this.x > canvasWidth + 30) {
                        this.y = canvasHeight + 20;
                        this.x = Math.random() * canvasWidth;
                    }
                }

                draw(ctx) {
                    const alpha = this.currentAlpha;
                    const r = this.baseR;
                    const g = this.baseG;
                    const b = this.baseB;
                    // 外层柔光
                    const outerGlow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius *
                        3.5);
                    outerGlow.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.7})`);
                    outerGlow.addColorStop(0.4, `rgba(${r},${g},${b},${alpha * 0.25})`);
                    outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = outerGlow;
                    ctx.fill();
                    // 核心亮点
                    const coreGlow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                    coreGlow.addColorStop(0,
                        `rgba(${Math.min(255,r+60)},${Math.min(255,g+50)},${Math.min(255,b+40)},${alpha})`);
                    coreGlow.addColorStop(0.6, `rgba(${r},${g},${b},${alpha * 0.6})`);
                    coreGlow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = coreGlow;
                    ctx.fill();
                }
            }

            function initParticles() {

                }

            function animateParticles() {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                for (const p of particles) {
                    p.update();
                    p.draw(ctx);
                }
                animationFrameId = requestAnimationFrame(animateParticles);
            }

            // ==================== DOM引用 ====================
            const momentsGrid = document.getElementById('momentsGrid');

            const sortBtns = document.querySelectorAll('.sort-btn');
            const lightboxOverlay = document.getElementById('lightboxOverlay');
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxCloseBtn = document.getElementById('lightboxCloseBtn');

            // ==================== 状态管理 ====================

            // ==================== 代码语法高亮 ====================
            function highlightCode(code, language) {
                const escaped = escapeHTML(code);
                // 通用高亮规则
                let highlighted = escaped;
                // 注释（# 开头或 // 开头）
                highlighted = highlighted.replace(/(^|\n)(\s*)(#.+$)/gm,
                    '$1$2<span class="code-cmt">$3</span>');
                highlighted = highlighted.replace(/(^|\n)(\s*)(\/\/.+$)/gm,
                    '$1$2<span class="code-cmt">$3</span>');
                // 字符串（双引号、单引号）
                highlighted = highlighted.replace(/(["'`])(?:(?!\1|\\).|\\.)*\1/g,
                    '<span class="code-str">$&</span>');
                // Python/docstring 三引号
                highlighted = highlighted.replace(/(["']{3})(?:(?!\1).|\n)*?\1/g,
                    '<span class="code-str">$&</span>');
                // 数字
                highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g,
                    '<span class="code-num">$1</span>');
                // 常见关键字
                const keywords = [
                    'def', 'return', 'if', 'else', 'elif', 'for', 'while', 'import', 'from',
                    'class', 'async', 'await', 'try', 'except', 'finally', 'with', 'as',
                    'yield', 'lambda', 'pass', 'break', 'continue', 'and', 'or', 'not',
                    'in', 'is', 'None', 'True', 'False', 'function', 'const', 'let', 'var',
                    'echo', 'done', 'fi', 'then', 'do', 'esac',
                ];
                const kwPattern = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');
                highlighted = highlighted.replace(kwPattern,
                    '<span class="code-kw">$1</span>');
                // 函数调用
                highlighted = highlighted.replace(/\b([a-zA-Z_]\w*)\s*\(/g,
                    '<span class="code-fn">$1</span>(');
                // 操作符
                highlighted = highlighted.replace(/(=&gt;|=&gt|[-+*/%=<>!]+)/g,
                    '<span class="code-op">$1</span>');
                return highlighted;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;

            // ==================== 渲染单张卡片 ====================
            function renderCardModules(modules) {
                let html = '';
                for (const mod of modules) {
                    switch (mod.type) {

                            html += `<div class="content-text">${escapeHTML(mod.data)}</div>`;

                        case 'images':
                            const imgCount = mod.data.length;

                            html += `<div class="${wrapperClass}">`;

                            const lineNumbersHTML = lines.map((_, i) => `<span>${i + 1}</span>`).join('');

                }
                // 排序
                filtered.sort((a, b) => {
                    if (currentSort === 'desc') return b.timestamp - a.timestamp;
                    return a.timestamp - b.timestamp;
                });
                // 渲染
                if (filtered.length === 0) {
                    momentsGrid.innerHTML = `
                        <div class="empty-state" style="column-span:all;">
                            <span class="empty-state-icon">🌌</span>
                            <p>没有找到匹配的动态</p>
                            <p style="font-size:0.8rem;margin-top:6px;">试试换个关键词吧～</p>
                        </div>`;
                } else {
                    momentsGrid.innerHTML = filtered.map(renderSingleCard).join('');
                }
                // 绑定图片点击事件
                bindImageClickEvents();
            }

            // ==================== 图片灯箱 ====================
            function bindImageClickEvents() {
                const allThumbs = momentsGrid.querySelectorAll('.content-image-thumb');
                allThumbs.forEach(thumb => {
                    thumb.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const src = this.getAttribute('data-lightbox-src') || this.src;
                        openLightbox(src);
                    });
                });
            }

            function openLightbox(src) {
                lightboxImage.src = src;
                lightboxOverlay.classList.add('lightbox-overlay--visible');
                lightboxOverlay.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightboxOverlay.classList.remove('lightbox-overlay--visible');
                lightboxOverlay.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                // 延迟清除图片src，让过渡动画完成
                setTimeout(() => {
                    if (!lightboxOverlay.classList.contains('lightbox-overlay--visible')) {
                        lightboxImage.src = '';
                    }
                }, 400);
            }

            lightboxCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeLightbox();
            });
            lightboxOverlay.addEventListener('click', function(e) {
                if (e.target === lightboxOverlay) {
                    closeLightbox();
                }
            });
            // 点击图片容器本身不关闭（在lightbox-image-container上）
            lightboxContainer.addEventListener('click', function(e) {
                e.stopPropagation();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightboxOverlay.classList.contains('lightbox-overlay--visible')) {
                    closeLightbox();
                }
            });

            // ==================== 搜索功能 ====================
            let searchDebounceTimer;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    searchQuery = this.value;
                    renderAllCards();
                }, 280);
            });

            // ==================== 排序切换 ====================
            sortBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const sortType = this.getAttribute('data-sort');
                    if (currentSort === sortType) return;
                    currentSort = sortType;
                    // 更新按钮状态
                    sortBtns.forEach(b => {
                        b.classList.remove('sort-btn--active');
                        b.setAttribute('aria-pressed', 'false');
                    });
                    this.classList.add('sort-btn--active');
                    this.setAttribute('aria-pressed', 'true');
                    // 重新渲染
                    renderAllCards();
                });
            });

            // ==================== 初始渲染 ====================
            renderAllCards();

            // ==================== 性能优化：防抖resize重渲染 ====================
            let resizeRenderTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeRenderTimer);
                resizeRenderTimer = setTimeout(() => {
                    // 重新绑定图片事件（因为DOM可能因响应式变化需要调整）
                    bindImageClickEvents();
                }, 300);
            });

            console.log('🌟 生活动态 · Moments 页面已就绪');
            console.log('   - 荧光粒子特效：' + PARTICLE_COUNT + ' 个粒子');
            console.log('   - 动态卡片：' + momentsData.length + ' 张');
            console.log('   - 支持内容类型：文本 / 图片 / 代码块 / 数据表格');
            console.log('   - 排序方式：' + (currentSort === 'desc' ? '最新优先' : '最早优先'));
            console.log('   🎨 霓虹荧光玻璃拟态 · 二次元风格');
        })();
    </script>
