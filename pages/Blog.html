  <style>
/* ============================================
           CSS 变量 - 主题配置区
           修改此处可一键切换整体风格
           ============================================ */
        .blog-page {
            /* 背景色 */
            --bg-dark: #0a0e1a;
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --bg-gradient-3: #0c0a1f;

            /* 主色调 - 科技蓝紫 */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #a78bfa;

            /* 文字颜色 */
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            /* 卡片玻璃拟态 */
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(148, 163, 184, 0.15);
            --card-border-hover: rgba(99, 102, 241, 0.4);
            --card-blur: 20px;
            --card-radius: 16px;

            /* 阴影 */
            --shadow-normal: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 40px rgba(99, 102, 241, 0.2);

            /* 按钮 */
            --btn-radius: 999px;
            --btn-bg-active: linear-gradient(135deg, #6366f1, #8b5cf6);
            --btn-bg-normal: transparent;
            --btn-border: rgba(148, 163, 184, 0.2);

            /* 标签 */
            --tag-radius: 6px;
            --tag-border: rgba(148, 163, 184, 0.2);
            --tag-text: #94a3b8;

            /* 间距 */
            --gap-card: 24px;
            --section-padding: 60px;

            /* 动画 */
            --transition-fast: 0.2s ease;
            --transition-normal: 0.35s cubic-bezier(0.4, 0, 0.2, 1);

            /* 内容最大宽度 */
            --max-width: 1200px;
        }

        /* ============================================
           基础重置
           ============================================ */
        .blog-page * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .blog-page {
            scroll-behavior: smooth;
        }
        .blog-page {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================
           背景渐变光晕效果
           ============================================ */
        .blog-page::before,
        .blog-page::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
        }

        .blog-page::before {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            right: -100px;
        }

        .blog-page::after {
            width: 500px;
            height: 500px;
            background: var(--accent);
            bottom: -150px;
            left: -100px;
        }

        .blog-page .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        /* ============================================
           主容器
           ============================================ */
        .blog-page .blog-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--section-padding) 24px;
        }

        /* ============================================
           顶部装饰标题区
           ============================================ */
        .blog-page .section-header {
            margin-bottom: 40px;
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .blog-page .section-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            text_transform: uppercase;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .blog-page .title-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            opacity: 0.6;
        }

        /* ============================================
           分类筛选栏
           ============================================ */
        .blog-page .filter-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 48px;
        }

        .blog-page .filter-btn {
            padding: 10px 24px;
            border: 1px solid var(--btn-border);
            border-radius: var(--btn-radius);
            background: var(--btn-bg-normal);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
            letter-spacing: 1px;
        }

        .blog-page .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            transform: translateY(-1px);
        }

        .blog-page .filter-btn.active {
            background: var(--btn-bg-active);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        /* ============================================
           卡片网格容器
           ============================================ */
        .blog-page .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--gap-card);
        }

        /* ============================================
           项目卡片
           ============================================ */
        .blog-page .project-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--card-bg);
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            padding: 28px;
            box-shadow: var(--shadow-normal);
            transition: all var(--transition-normal);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: cardEnter var(--transition-normal) forwards;
        }

        /* 卡片入场动画（仅首次加载生效） */
        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 卡片隐藏状态 - 无动画直接隐藏 */
        .blog-page .project-card.hide {
            display: none;
        }

        /* 卡片悬停效果 */
        .blog-page .project-card:hover {
            transform: translateY(-6px);
            border-color: var(--card-border-hover);
            box-shadow: var(--shadow-hover);
        }

        .blog-page .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .blog-page .project-card:hover::before {
            opacity: 1;
        }

        /* 卡片顶部行 */
        .blog-page .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }

        .blog-page .card-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .blog-page .card-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .blog-page .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
        }

        .blog-page .github-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            color: var(--text-muted);
            transition: color var(--transition-fast);
        }

        .blog-page .project-card:hover .blog-page .github-icon {
            color: var(--primary-light);
        }

        /* 卡片描述区 */
        .blog-page .card-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 卡片标签区 */
        .blog-page .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .blog-page .tag {
            padding: 4px 10px;
            font-size: 12px;
            color: var(--tag-text);
            border: 1px solid var(--tag-border);
            border-radius: var(--tag-radius);
            background: rgba(99, 102, 241, 0.05);
            letter-spacing: 0.5px;
        }

        /* ============================================
           页脚
           ============================================ */
        .blog-page .footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid rgba(148, 163, 184, 0.08);
            margin-top: 40px;
        }

        /* ============================================
           响应式适配
           ============================================ */
        @media (max-width: 1024px) {
            .blog-page .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .blog-page {
                --gap-card: 16px;
                --section-padding: 40px;
            }

            .blog-page .cards-grid {
                grid-template-columns: 1fr;
            }

            .blog-page .section-title {
                font-size: 22px;
                letter-spacing: 2px;
            }

            .blog-page .project-card {
                padding: 22px;
            }

            .blog-page .card-title {
                font-size: 18px;
            }

            .blog-page .filter-btn {
                padding: 8px 18px;
                font-size: 13px;
            }
        }
  </style>

  <script>
/* ============================================
           配置区 - 可在此修改分类和项目数据
           ============================================ */

        // ====== 分类配置 ======
        // 新增分类只需在此数组中添加，value 需与项目 data-category 对应
        const CATEGORIES = [
            { label: 'ALL', value: 'all' },
            { label: 'AI', value: 'ai' },
            { label: 'Python', value: 'python' },
            { label: 'Tool', value: 'tool' }
        ];

        // ====== 项目数据配置 ======
        // 所有卡片统一测试链接，替换为真实地址即可
        const DEFAULT_LINK = 'https://www.xinghuisama.top/projects';

        const PROJECTS = [
            {
                icon: '⚛️',
                title: 'Gromacs RMSF Tool',
                description: '基于 WSL2 Ubuntu22 平台的计算化学工具，整合分子动力学模拟流程，自动化分析蛋白质 RMSF 数据。',
                tags: ['Gromacs', 'RMSF', 'WSL2'],
                category: 'tool',
                link: DEFAULT_LINK
            },
            {
                icon: '☁️',
                title: 'XingHuiSama の Cloud',
                description: '基于 Next.js App Router 构建的高性能全栈个人博客，包含悬浮音乐播放器与毛玻璃 UI 设计。',
                tags: ['Next.js', 'React', 'TailwindCSS'],
                category: 'tool',
                link: DEFAULT_LINK
            },
            {
                icon: '🧠',
                title: 'Neural Network Visualizer',
                description: '交互式神经网络可视化工具，直观展示前向传播与反向传播过程，支持自定义网络结构。',
                tags: ['PyTorch', 'NumPy', 'Matplotlib'],
                category: 'ai',
                link: DEFAULT_LINK
            },
            {
                icon: '📊',
                title: 'Data Pipeline Framework',
                description: '轻量级数据处理流水线框架，支持多源数据接入、清洗、特征工程全流程自动化调度。',
                tags: ['Python', 'Pandas', 'ETL'],
                category: 'python',
                link: DEFAULT_LINK
            },
            {
                icon: '🔬',
                title: 'Molecule Generator',
                description: '基于生成式 AI 的小分子药物分子生成模型，使用强化学习优化分子属性与合成可及性。',
                tags: ['Deep Learning', 'RDKit', 'Drug Discovery'],
                category: 'ai',
                link: DEFAULT_LINK
            },
            {
                icon: '🛠️',
                title: 'CLI Dev Toolkit',
                description: '开发者命令行工具箱，集成代码格式化、Git 批量操作、项目脚手架等常用开发效率工具。',
                tags: ['Shell', 'CLI', 'DevOps'],
                category: 'tool',
                link: DEFAULT_LINK
            },
            {
                icon: '🤖',
                title: 'LLM Fine-tuning Suite',
                description: '大语言模型微调全流程套件，支持 LoRA / QLoRA 高效微调，内置多数据集预处理模板。',
                tags: ['Transformers', 'LoRA', 'NLP'],
                category: 'ai',
                link: DEFAULT_LINK
            },
            {
                icon: '🐍',
                title: 'Async Web Crawler',
                description: '高性能异步网络爬虫框架，支持分布式部署、自动反爬策略与结构化数据导出。',
                tags: ['Asyncio', 'Aiohttp', 'Scrapy'],
                category: 'python',
                link: DEFAULT_LINK
            }
        ];

        /* ============================================
           渲染逻辑 - 一般无需修改
           ============================================ */

        const filterBar = document.getElementById('filterBar');
        const cardsGrid = document.getElementById('cardsGrid');

        // GitHub SVG 图标内联字符串
        const GITHUB_SVG = `
            <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
        `;

        /**
         * 渲染分类按钮
         */
        function renderFilters() {
            CATEGORIES.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${index === 0 ? 'active' : ''}`;
                btn.textContent = cat.label;
                btn.dataset.category = cat.value;
                btn.addEventListener('click', () => handleFilter(cat.value));
                filterBar.appendChild(btn);
            });
        }

        /**
         * 渲染所有项目卡片
         */
        function renderCards() {
            PROJECTS.forEach((project, index) => {
                const card = document.createElement('a');
                card.className = 'project-card';
                card.href = project.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.dataset.category = project.category;
                // 错落入场延迟（仅首次加载）
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title-wrap">
                            <span class="card-icon">${project.icon}</span>
                            <h3 class="card-title">${project.title}</h3>
                        </div>
                        ${GITHUB_SVG}
                    </div>
                    <p class="card-description">${project.description}</p>
                    <div class="card-tags">
                        ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                `;

                cardsGrid.appendChild(card);
            });
        }

        /**
         * 处理分类筛选（无动画版本）
         */
        function handleFilter(category) {
            // 更新按钮选中状态
            const buttons = filterBar.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            // 直接切换卡片显示隐藏，无过渡动画
            const cards = cardsGrid.querySelectorAll('.project-card');
            cards.forEach(card => {
                const cardCategory = card.dataset.category;
                const shouldShow = category === 'all' || cardCategory === category;
                card.classList.toggle('hide', !shouldShow);
            });
        }

        /**
         * 初始化
         */
        function init() {
            renderFilters();
            renderCards();
        }

        // 启动
        document.addEventListener('DOMContentLoaded', init);
  </script>
